<form (ngSubmit)="onSubmit()" #form="ngForm"> <!-- (ngSubmit) - это событие, которое срабатывает при отправке формы. Когда пользователь нажимает кнопку отправки, Angular вызывает метод onSubmit() в компоненте. #form="ngForm" - это шаблонная переменная, которая позволяет нам получить доступ к состоянию формы и ее элементам внутри шаблона. -->
    <label for="three_one">Input_one(ID)</label><br>
    <input type="text" name="three_one_" [(ngModel)]="input1" [placeholder]="input1" required><br> <!-- [(ngModel)] - это синтаксис для двусторонней привязки данных в Angular. Он связывает значение поля ввода с переменной input1 в компоненте. Когда пользователь вводит текст в поле, значение input1 автоматически обновляется, и наоборот, если значение input1 изменится в компоненте, оно также обновится в поле ввода. -->

    <label for="three_two">Input_two(Title)</label><br>
    <input type="text" name="three_two_" [(ngModel)]="input2"><br> <!-- name - атрибут, который связывает label с полем ввода -->

    <input type="submit" value="Click to submit">
</form> <br><br><br>
